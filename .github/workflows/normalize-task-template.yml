name: Normalize context field

on:
  workflow_call:

permissions:
  issues: write

jobs:
  normalize:
    runs-on: ubuntu-latest

    steps:
      - name: Normalize context only
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) return;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const body = issue.body || '';

            function escapeRegex(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }

            function getContextSection() {
              const regex = new RegExp(
                `### ${escapeRegex('📧 Context')}\\s*\\n([\\s\\S]*?)(?=\\n### |$)`,
                'm'
              );
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            }

            function formatContext(raw) {
              const value = raw.trim();
              if (!value) return '';

              if (/^https?:\/\/\S+$/i.test(value)) {
                return `[Context](${value})`;
              }

              const ticketMatch = value.match(/^#?(\d+)$/);
              if (ticketMatch) {
                const ticket = ticketMatch[1];
                return `[Context](https://srkcrs.zendesk.com/agent/tickets/${ticket})`;
              }

              return value;
            }

            const original = getContextSection();
            const formatted = formatContext(original);

            let newBody = body;

            if (!formatted) {
              // remove entire section if empty
              newBody = body.replace(
                new RegExp(
                  `\\n?### ${escapeRegex('📧 Context')}\\s*\\n[\\s\\S]*?(?=\\n### |$)`,
                  'm'
                ),
                ''
              ).trim();
            } else if (formatted !== original) {
              // replace only the content inside the section
              newBody = body.replace(
                new RegExp(
                  `(### ${escapeRegex('📧 Context')}\\s*\\n)([\\s\\S]*?)(?=\\n### |$)`,
                  'm'
                ),
                `$1${formatted}\n`
              );
            }

            if (newBody.trim() !== body.trim()) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number,
                body: newBody
              });
            }
